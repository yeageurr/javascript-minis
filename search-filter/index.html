<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search bar  using JavaScript</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 30%;
    }
    .box {
      width: 10%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    form {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    form > input {
      padding: 5px 10px;
      font-size: 15px;
      outline: none;
      border: none;
      border-bottom: 1px solid #000;
    }
    form > button {
      width: 15%;
      padding: 5px 0;
      cursor: pointer;
    }
    .content {
      border-bottom: 1px solid rgba(0, 0, 0, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 50px 3px 50px;
    }
  </style>
</head>
<body>
  <div class="wrapper" id="wrapper">
    <p class="title">Search Filter using JavaScript </p>
    <form id="search">
      <input type="text" name="input" id="input" placeholder="Enter keywords..." autocomplete="off" />
      <button type="submit" id="submit">Search</button>
    </form>
    <div class="box" id="box"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
