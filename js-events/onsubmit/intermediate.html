<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <title>To do list — Onsubmit</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    :root { --mainBGColor: #a8a8a8;--borderRadius: .3em;--fixedWidth: 25em;--fixedHeight: 25em; }
    * { margin: 0;padding: 0;box-sizing: border-box; }
    body { width: 100vw;height: 100vh;font-size: 20px;box-sizing: border-box;background-color: var(--mainBGColor); }
    .wrapper { width: 100%;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: center; }
    .wrapper > .container { background-color: #d4d4d4;border-radius: var(--borderRadius);min-height: var(--fixedHeight);max-height: var(--fixedHeight);min-width: var(--fixedWidth);max-width: var(--fixedWidth);display: flex;flex-direction: column;align-items: center;justify-content: start;overflow: hidden; }
    .container > hr { width: 100%; }
    .container > .topheader { font-family: 'Poppins', serif;font-size: 1.5em;width: 100%;text-align: center;background-color: #7a3792;color: #fff;padding: .1em 0;margin-bottom: .8em; }
    .container > .listbox { display: flex;flex-direction: column;width: 100%;flex: .9;gap: 0.3em;max-height: 19.5em;overflow-y: auto; }
    .listbox > .taskWrapper { width: 100%;padding: .3em .8em;font-family: "Poppins", serif;font-size: 0.8em;border-top: 1px solid rgba(0, 0, 0, .3);border-bottom: 1px solid rgba(0, 0, 0, .3); }
    .empty { width: 100%;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: center;font-family: 'Poppins', serif;gap: 0.5em; }
    .empty > i { font-size: 2.5em; }
    form { display: flex;align-items: center;justify-content: center;width: 100%;flex: 0.1;gap: 0.5em; }
    form > input { font-family: 'Poppins', serif;outline: none;padding: .2em .4em; }
    form > button { font-family: 'Poppins', serif;display: flex;align-items: center;justify-content: center;gap: 0.3em;padding: 0.2em 0.4em;font-size: .65em;font-weight: 500; }

  </style>
</head>
<body>
  
  <div class="wrapper">
    <div class="container">
      <p class="topheader">To Do List</p>
      <div class="listbox"></div>
      <hr>
      <form action="" class="formbox" onsubmit="addToList(event)">
        <input type="text" class="newTask" id="newTask" placeholder="Enter new task..." autocomplete="off" oninput="submitButtonToggle(this.value)" required />
        <button type="submit" class="submitButton" id="submitButton" disabled>
          <i class='bx bx-plus'></i>
          Add task
        </button>
      </form>
    </div>
  </div>

  <script>
    const log = console.log;
    const listDiv = document.querySelector('.listbox');
    const newTask = document.getElementById('newTask');
    const submitButton = document.getElementById('submitButton');
    const tasks = [];
    let html = '';

    function submitButtonToggle(val) {
      if((val.trim()).length == 0) {
        submitButton.disabled = true;
        return;
      }

      submitButton.disabled = false;
    }

    function displayTasks() {
      html = '';
      if( tasks.length == 0) {
        html = `
          <div class="empty">
            <i class='bx bx-party'></i>
            <p class="emptyMessage">Hooray! You have no pending tasks for now.</p>
          </div>
        `;
      }

      for(let task of tasks) {
        html += `
          <div class="taskWrapper">
            <p>${task}</p>
          </div>
        `;
      }
      listDiv.innerHTML = html;
      return;
    }
    
    function addToList(event) {
      event.preventDefault();
      tasks.push(newTask.value);
      newTask.value = "";
      displayTasks();

    }

    displayTasks()
  </script>
</body>
</html>
