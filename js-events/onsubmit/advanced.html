<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <title>Multi-Step Registration - onsubmit</title>
</head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
  
  :root { --labelFontSize: .9em; }
  * { margin: 0;padding: 0;box-sizing: border-box; }
  body { margin: 0;padding: 0;width: 100vw;height: 100vh;font-size: 20px;font-family: 'Poppins', serif; }
  .wrapper { width: 100%;height: 100%;display: flex;align-items: center;justify-content: center;background-color: #e0e0e0; }
  
  
  .loadingOverlay { height: 100%;width: 100%;position: absolute;background-color: rgba(0, 0, 0, .4);display: none;align-items: center;justify-content: center; }
  .loadingOverlay > .circles {width: max-content;height: max-content;display: flex;align-items: center;justify-content: center;gap: .5em; }
  .circles > .node { width: 1.5em;height: 1.5em;background-color: #fff;border-radius: 50%; }
  .circles > .left { background-color: #09ff3e;animation: bounce .7s linear 0s infinite normal forwards; }
  .circles > .center { background-color: #09fbff;animation: bounce .7s linear .2s infinite normal forwards; }
  .circles > .right { background-color: #ff0909;animation: bounce .7s linear .4s infinite normal forwards; }
  @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-1em); } 100% { transform: translateY(0); } }

</style>
<body>

  <div class="wrapper">
    <div class="container">

      <div class="guide">
        <div class="step-wrapper">
          <div class="circle">1</div>
          <div class="step_info">
            <span>First Step</span>
            <b>Personal Info</b>
          </div>
        </div>
        <div class="step-wrapper">
          <div class="circle">2</div>
          <div class="step_info">
            <span>Second Step</span>
            <b>Account Setup</b>
          </div>
        </div>
        <div class="step-wrapper">
          <div class="circle">3</div>
          <div class="step_info">
            <span>Verify</span>
            <b>Verify your E-mail</b>
          </div>
        </div>
        <div class="step-wrapper">
          <div class="circle">4</div>
          <div class="step_info">
            <span>Summary</span>
            <b>Your Information</b>
          </div>
        </div>
      </div>
      <div class="field-wrapper"></div>
      
      <!-- <div class="loadingOverlay">
        <div class="circles">
          <div class="node left"></div>
          <div class="node center"></div>
          <div class="node right"></div>
        </div>
      </div> -->
    </div>
  </div>
  
  <script>
    const log = console.log;
  </script>
</body>
</html>
