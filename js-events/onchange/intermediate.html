<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Currency Converter - onchange Activity</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    
    * { margin: 0;padding: 0;box-sizing: border-box; }
    body { width: 100vw;height: 100vh;box-sizing: border-box;font-size: 16px;padding: 0;margin: 0;font-family: 'Roboto', serif; }
    .container { width: 100%;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: center; }
    .container > .wrapper { border: 1px solid #000;display: flex;flex-direction: column;align-items: center;justify-content: center;padding: 1.5em;border-radius: 0.5em;background-color: #ebebeb;width: max-width;height: max-height; }
    .wrapper > header { width: 100%;display: flex;flex-direction: column;align-items: center;justify-content: center;gap: 0.2em;margin-bottom: 1.5em; }
    .wrapper > header > h2 { letter-spacing: 0.05em;font-size: 2.2em;font-weight: 450; }
    .wrapper > header > p { font-size: 0.8em; }
    .wrapper > .inputFields { display: flex;align-items: center;justify-content: center;gap: 0.5em;padding: 0.5em; }
    .inputFields > input, .inputFields > select { width: 50%;padding: 0.3em;outline: none;border: 1px solid rgba(0, 0, 0, .3);background-color: #fff;font-family: 'Poppins', serif;font-size: 0.9em; }
    .wrapper > p { width: 95%;margin-top: 0.5em;height: 3em;border-bottom: 1px solid #000;display: flex;align-items: center;padding: .3em .3em 0 .3em;font-family: 'Roboto', serif; }

  </style>
</head>
<body>

  <div class="container">
    <div class="wrapper">
      <header class="heading">
        <h2 class="title">Simple Currency Converter</h2>
        <p class="name">Domasig, Anthony O. — BSIT 3B</p>
      </header>

      <div class="inputFields">
        <input type="number" name="input" id="input" class="input" autocomplete="off" placeholder="Enter Value" oninput="setAmount(this.value)"/>
        <select name="currency" id="currency" onchange="calc(this.value)">
          <option value="1">Select Currency</option>
          <option value="60.71">USD</option>
          <option value="70.18">EUR</option>
          <option value="79.36">GBP</option>
        </select>
      </div>
      <p class="output" id="output">₱0.00</p>

    </div>
  </div>
  
  <script>
    const log = console.log;
    const output = document.getElementById('output')
    const input = document.getElementById('input');

    function setAmount(val) {
      const curr = document.getElementById('currency');
      show(val*curr.value);
    }

    function calc(val) {
      show(input.value * val);
    }

    function show(result) {
      output.textContent = `₱${result.toFixed(2)}`;
    }
  </script>
</body>
</html>
