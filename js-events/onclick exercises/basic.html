<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic onCLick</title>

  <style>
    * { margin: 0;padding: 0;box-sizing: border-box; }
    body { width: 100vw;height: 100vh;display: flex;align-items: center;justify-content: center; }
    .wrapper { padding: 25px;flex: .5; height: 35%; background-color: #ebebeb;width: max-content;border-radius: 5px;display: flex;flex-direction: column;align-items: center;justify-content: center; }
    .wrapper > button { cursor: pointer;padding: 10px 25px;background-color: #1900ff;border: none;border-radius: 5px;color: #fff;font-size: 20px; &:hover {background-color: #4d39ff;} }
  </style>

</head>
<body>
  
  <div class="wrapper">
    <button type="button" id="switch" onclick="changeStyles()">ON</button>
  </div>

  <script>

    const button = document.getElementById('switch')
    const body = document.body;
    const transition = ".2s all ease-in-out";
    let flag = true;

    function changeStyles() {
      if(flag) {
        button.textContent = "OFF";
        body.style.backgroundColor = "#000";
        body.style.transition = transition;
        flag = !flag;
      } else {
        button.textContent = "ON";
        body.style.backgroundColor = "#fff";
        body.style.transition = transition;
        flag = !flag;
      }
    }
  </script>

</body>
</html>
